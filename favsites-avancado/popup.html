<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="extensionName">Diretórios de Favoritos Rápidos Avançado</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Toasts container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <!-- Modal overlay (reused for prompts, notes, reminders, credentials) -->
  <div id="modal-container" class="modal-overlay" style="display:none"></div>
  <div class="popup-content">
    <header class="top-bar">
      <div id="directories" class="directories"></div>
      <button id="create-directory" class="icon-btn" title="Criar diretório" aria-label="Criar diretório">
        <!-- Plus icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>
    <div class="actions-bar">
      <button id="add-site" class="primary-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span class="label" data-i18n="addSite">Adicionar site da aba</span>
      </button>
      <input id="search-input" type="search" placeholder="" aria-label="Buscar" />
    </div>
    <ul id="items-list" class="items-list" role="list"></ul>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
