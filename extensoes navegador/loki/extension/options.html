<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações - Smart Tab Auto Manager</title>
    <style>
      body { font-family: Arial, sans-serif; background: #111; color: #f2f2f2; margin: 0; }
      .container { max-width: 800px; margin: 20px auto; padding: 16px; background: #1a1a1a; border-radius: 10px; }
      h1 { margin-top: 0; }
      .row { margin-bottom: 12px; }
      label { display: block; margin-bottom: 6px; }
      input, button { padding: 8px; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; }
      button { cursor: pointer; background: #2c8dff; border: none; }
      .checkbox { display: flex; align-items: center; gap: 8px; }
      #status { min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Configurações Globais</h1>

      <div class="row">
        <label for="defaultInterval">Intervalo padrão (segundos)</label>
        <input type="number" id="defaultInterval" min="1" max="86400" value="30" />
      </div>

      <div class="row">
        <label for="progressiveDelay">Delay progressivo entre abas (ms)</label>
        <input type="number" id="progressiveDelay" min="0" max="10000" value="250" />
      </div>

      <div class="row checkbox">
        <input type="checkbox" id="pauseBackgroundRefresh" />
        <label for="pauseBackgroundRefresh">Pausar refresh em abas em background</label>
      </div>

      <div class="row">
        <button id="saveBtn">Salvar configurações</button>
      </div>

      <div id="status"></div>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
